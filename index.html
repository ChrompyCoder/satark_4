<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEC-CORP Internal Portal</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0d1117;
            color: #58a6ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            border: 1px solid #30363d;
            padding: 40px;
            border-radius: 10px;
            background-color: #161b22;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h1 { color: #f85149; }
        .status { color: #8b949e; font-style: italic; }
        .terminal {
            text-align: left;
            background: #000;
            padding: 15px;
            border-radius: 5px;
            color: #39ff14;
            font-size: 0.9em;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SYSTEM RESTRICTED</h1>
    <p class="status">Unauthorized access is strictly prohibited.</p>
    
    <div class="terminal">
        <p>> Initializing security protocols...</p>
        <p>> Monitoring active connections...</p>
        <p>> System Status: <span style="color: yellow;">PENDING AUDIT</span></p>
    </div>

    <p style="margin-top: 20px;">There is a hidden file on this server containing the <strong>Cyber Ethics Charter</strong>. Find it, crack it, and report the flag.</p>
</div>

</body>
</html>
